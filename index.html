<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd6e0">

<style>
body { margin:0; font-family:"Itim"; background:#f5f6fa; }

.header {
  display:flex; flex-direction:column; padding:15px;
  position:sticky; top:0; z-index:1000;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.8);
}

.top-row { display:flex; justify-content:space-between; }
.buttons { display:flex; gap:8px; }

button {
  border:none;
  padding:8px 12px;
  border-radius:12px;
  background:#ffd6e0;
  position:relative;
  z-index:10; /* 🔥 กันโดนบัง */
}

.calendar {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:12px;
}

.day {
  position:relative;
  background:white;
  border-radius:20px;
  aspect-ratio:1/1;
  overflow:hidden;
}

.day-name {
  position:absolute;
  top:8px;
  left:12px;
  font-weight:bold;
  z-index:2;
}

.date-number {
  position:absolute;
  bottom:-25px;
  right:-10px;
  font-size:110px;
  font-weight:900;
  z-index:2;
}

.note-preview {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:2;
}

.note-box {
  font-size:12px;
  padding:4px 6px;
  border-radius:8px;
  color:white;
}

.preview {
  width:100%;
  height:250px;
  border-radius:20px;
  background-size:cover;
  margin-bottom:10px;
  position:relative;
  z-index:1;
}

.overlay {
  position:absolute;
  inset:0;
  border-radius:20px;
  pointer-events:none; /* 🔥 สำคัญ */
}

.editor { display:none; padding:15px; }

.note-input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="calendarPage">

<div class="header">
  <div class="top-row">
    <div id="monthLabel"></div>
    <div class="buttons">
      <button onclick="prevMonth()">◀</button>
      <button onclick="nextMonth()">▶</button>
      <button onclick="goToday()">🏠</button>
    </div>
  </div>
  <div id="todayText"></div>
</div>

<div class="calendar" id="calendar"></div>
</div>

<div id="editorPage" class="editor">

<button onclick="back()">⬅ กลับ</button>
<h3 id="selectedDate"></h3>

<input type="file" id="imgInput" accept="image/*">

<div class="preview" id="preview">
  <div class="overlay" id="overlay"></div>
</div>

<label>Blur</label>
<input type="range" id="blurRange" min="0" max="20">

<label>Opacity</label>
<input type="range" id="opacityRange" min="0" max="1" step="0.1">

<input id="noteInput" class="note-input" placeholder="เพิ่มโน้ต...">

<br><br>
<button onclick="addNote()">➕ เพิ่มโน้ต</button>

<div id="noteList"></div>

<br>
<button onclick="save()">💾 บันทึก</button>
<button onclick="remove()">🗑 ลบ</button>

</div>

<script>
const monthNames=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const dayNames=["อา","จ","อ","พ","พฤ","ศ","ส"];

let currentDate=new Date();
let selectedKey="";
let imageData="";
let notes=[];
let blurValue=0;
let opacityValue=0.3;

function key(y,m,d){ return y+"-"+m+"-"+d; }

function renderCalendar(){
const cal=document.getElementById("calendar");
cal.innerHTML="";

const y=currentDate.getFullYear();
const m=currentDate.getMonth();

document.getElementById("monthLabel").innerText=
monthNames[m]+" "+(y+543);

const days=new Date(y,m+1,0).getDate();

for(let i=1;i<=days;i++){
let k=key(y,m,i);
let saved=JSON.parse(localStorage.getItem(k));

let div=document.createElement("div");
div.className="day";

if(saved && saved.img){
div.style.backgroundImage=`url(${saved.img})`;
div.style.backgroundSize="cover";
div.style.backgroundPosition="center";
}

div.innerHTML=`
<div class="day-name">${dayNames[new Date(y,m,i).getDay()]}</div>
<div class="date-number">${i}</div>
<div class="note-preview"></div>
`;

if(saved && saved.notes){
let preview=div.querySelector(".note-preview");
saved.notes.forEach(n=>{
let box=document.createElement("div");
box.className="note-box";
box.style.background=n.color;
box.innerText=n.text;
preview.appendChild(box);
});
}

div.onclick=()=>openEditor(k,i);
cal.appendChild(div);
}
}

function openEditor(k,day){
selectedKey=k;
document.getElementById("calendarPage").style.display="none";
document.getElementById("editorPage").style.display="block";

document.getElementById("selectedDate").innerText="วันที่ "+day;

let saved=JSON.parse(localStorage.getItem(k));

if(saved){
imageData=saved.img||"";
notes=saved.notes||[];
blurValue=saved.blur||0;
opacityValue=saved.opacity||0.3;
}else{
notes=[];
}

renderNotes();

if(imageData){
document.getElementById("preview").style.backgroundImage=`url(${imageData})`;
}

blurRange.value=blurValue;
opacityRange.value=opacityValue;
updateStyle();
}

function addNote(){
let text=document.getElementById("noteInput").value;
if(!text) return;

notes.push({text, color:"red"});
document.getElementById("noteInput").value="";
renderNotes();
}

function renderNotes(){
let list=document.getElementById("noteList");
list.innerHTML="";

notes.forEach((n,i)=>{
list.innerHTML+=`
<div>${n.text} <button onclick="del(${i})">ลบ</button></div>
`;
});
}

function del(i){
notes.splice(i,1);
renderNotes();
}

imgInput.onchange=e=>{
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=ev=>{
imageData=ev.target.result;
preview.style.backgroundImage=`url(${imageData})`;
};
reader.readAsDataURL(file);
};

function updateStyle(){
blurValue=blurRange.value;
opacityValue=opacityRange.value;

preview.style.filter=`blur(${blurValue}px)`;
overlay.style.background=`rgba(255,255,255,${opacityValue})`;
}

blurRange.oninput=updateStyle;
opacityRange.oninput=updateStyle;

function save(){
document.getElementById("noteInput").blur(); // 🔥 FIX มือถือ

localStorage.setItem(selectedKey,JSON.stringify({
img:imageData,
notes:notes,
blur:blurValue,
opacity:opacityValue
}));

back();
}

function remove(){
localStorage.removeItem(selectedKey);
back();
}

function back(){
document.getElementById("calendarPage").style.display="block";
document.getElementById("editorPage").style.display="none";
renderCalendar();
}

function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }
function goToday(){ currentDate=new Date(); renderCalendar(); }

renderCalendar();
</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
